experiment_name = "uci_regr_protein"
seed            = 4
backend         = "cpu"
output_dir      = "results/tabular_regression/protein"

# Regression: predict protein tertiary structure RMSD
# Physicochemical properties of protein tertiary structure (UCI, CASP)
# 45730 rows total; capped at 20000 for tractability
# 9 features
task = "regression"

[data]
path            = "../../data/protein.tsv"
use_synthetic   = false
normalize       = true
train_split     = 0.7
valid_split     = 0.1
test_split      = 0.2
datapoint_limit = 20000

[model]
# Protein: F1–F9 physicochemical descriptors
input_dim        = 9
hidden_structure = [128, 64, 2]  # 2 outputs: (mu, log_sigma) for Gaussian NLL
use_bias         = true

[warmstart]
enabled       = true
max_epochs    = 500
batch_size    = 64
learning_rate = 0.01
patience      = 20

[sampler]
sampler                   = "mclmc"
n_chains                  = 12
n_samples                 = 10000
n_thinning                = 10
warmup_steps              = 50000
step_size_init            = 0.01
desired_energy_var_start  = 0.5
desired_energy_var_end    = 0.1
trust_in_estimate         = 1.5
num_effective_samples     = 100
diagonal_preconditioning  = false
nuts_max_depth            = 10
nuts_target_accept        = 0.80

[sampler.prior]
name = "StandardNormal"
