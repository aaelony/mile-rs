experiment_name = "diagnostics_nuts"
seed            = 42
output_dir      = "results/diagnostics/nuts"

task = "regression"

[data]
path          = "../../data/airfoil.csv"
use_synthetic = false
normalize     = true
train_split   = 0.7
valid_split   = 0.1
test_split    = 0.2

[model]
input_dim        = 5
hidden_structure = [8, 8, 8, 8, 8, 8, 2]
use_bias         = true

[warmstart]
enabled       = true
max_epochs    = 500
batch_size    = 32
learning_rate = 0.01
patience      = 10

[sampler]
sampler                   = "nuts"
n_chains                  = 12
n_samples                 = 1000
n_thinning                = 1
warmup_steps              = 100
step_size_init            = 0.001
desired_energy_var_start  = 0.5
desired_energy_var_end    = 0.1
trust_in_estimate         = 1.5
num_effective_samples     = 100
diagonal_preconditioning  = false
nuts_max_depth            = 10
nuts_target_accept        = 0.80

[sampler.prior]
name = "StandardNormal"
