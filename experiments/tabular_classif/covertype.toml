experiment_name = "uci_classif_covertype"
seed            = 4
output_dir      = "results/tabular_classif/covertype"

# 7-class forest cover type classification
task = { classification = { n_classes = 7 } }

[data]
path        = "../../data/covertype_proc.tsv"
normalize   = false
train_split = 0.4
valid_split = 0.1
test_split  = 0.5

[model]
# Covertype dataset: 54 features
input_dim        = 54
hidden_structure = [32, 7]
use_bias         = true

[warmstart]
enabled       = true
max_epochs    = 500
batch_size    = 32
learning_rate = 0.001
patience      = 20

[sampler]
sampler                   = "mclmc"
n_chains                  = 12
n_samples                 = 10000
n_thinning                = 10
warmup_steps              = 50000
step_size_init            = 0.001
desired_energy_var_start  = 0.5
desired_energy_var_end    = 0.1
trust_in_estimate         = 1.5
num_effective_samples     = 100
diagonal_preconditioning  = false
nuts_max_depth            = 10
nuts_target_accept        = 0.80

[sampler.prior]
name = "StandardNormal"
